# LiveFolders configuration
# Run: livefolders [mountpoint] [--config path]
# Mountpoint defaults to /tmp/livefolders if not set here or via CLI.

mount: /tmp/livefolders
tools_dir: ~/.config/livefolders/tools
timeout: 30

tools:
  - name: echo

  - name: github
    # token_env: GITHUB_TOKEN   # default; uncomment to override env var name
